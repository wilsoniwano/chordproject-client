<!-- Button -->
@if (user) {
    <button mat-icon-button [matMenuTriggerFor]="userActions">
        <span class="relative">
            @if (user.avatar) {
                <img class="h-7 w-7 rounded-full" [src]="user.avatar" />
            } @else {
                <mat-icon [svgIcon]="'heroicons_outline:user'"></mat-icon>
            }
        </span>
    </button>

    <mat-menu [xPosition]="'before'" #userActions="matMenu">
        <button mat-menu-item>
                <span class="flex flex-col leading-none">
                <span>{{ 'common.signed_in_as' | transloco }}</span>
                <span class="mt-1.5 text-md font-medium">{{
                    user?.email
                }}</span>
            </span>
        </button>
        <mat-divider class="my-2"></mat-divider>
        <button mat-menu-item [routerLink]="['/profile']">
            <mat-icon [svgIcon]="'heroicons_outline:user'"></mat-icon>
            <span>{{ 'common.profile' | transloco }}</span>
        </button>
        <button mat-menu-item (click)="settings()">
            <mat-icon [svgIcon]="'heroicons_outline:cog-8-tooth'"></mat-icon>
            <span>{{ 'common.settings' | transloco }}</span>
        </button>
        <mat-divider class="my-2"></mat-divider>
        <button mat-menu-item (click)="signOut()">
            <mat-icon
                [svgIcon]="'heroicons_outline:arrow-right-on-rectangle'"
            ></mat-icon>
            <span>{{ 'common.sign_out' | transloco }}</span>
        </button>
    </mat-menu>
} @else {
    <button mat-icon-button [routerLink]="['/sign-in']">
        <mat-icon [svgIcon]="'heroicons_outline:user'"></mat-icon>
    </button>
}
