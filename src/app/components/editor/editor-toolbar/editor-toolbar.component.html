<div class="flex flex-0 items-center justify-between border-b bg-white px-4 py-3 dark:bg-[#0f172a]">
    <div class="min-w-0 flex-1 pr-3 text-left">
        @if (mode === 'full') {
            <div class="truncate text-[1.25rem] font-semibold leading-tight">Editar</div>
        } @else if (title || artist) {
            <div class="truncate text-sm font-semibold">{{ title }}</div>
            @if (artist) {
                <div class="text-secondary truncate text-xs">{{ artist }}</div>
            }
        }
    </div>
    <div class="flex items-center gap-2">
        <button
            mat-icon-button
            aria-label="Save song"
            [matTooltip]="'toolbar.save' | transloco"
            (click)="saveSongEvent.emit()"
        >
            <mat-icon [svgIcon]="'heroicons_outline:document-arrow-down'"></mat-icon>
        </button>
        <button
            mat-icon-button
            aria-label="Delete song"
            [color]="'warn'"
            [matTooltip]="'toolbar.delete' | transloco"
            (click)="removeSongEvent.emit()"
        >
            <mat-icon class="text-warn-500" [svgIcon]="'heroicons_outline:trash'"></mat-icon>
        </button>
        @if (mode === 'quick') {
            <button mat-icon-button [matTooltip]="'toolbar.open_full_editor' | transloco" (click)="openFullEditorEvent.emit()">
                <mat-icon [svgIcon]="'heroicons_outline:arrow-top-right-on-square'"></mat-icon>
            </button>
        }
        @if (mode === 'full' && showHelp) {
            <button mat-icon-button [matTooltip]="'toolbar.help' | transloco" (click)="helpEvent.emit()">
                <mat-icon [svgIcon]="'heroicons_outline:question-mark-circle'"></mat-icon>
            </button>
        }
        <button mat-icon-button [matTooltip]="'toolbar.close' | transloco" (click)="closeEvent.emit()">
            <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
        </button>
    </div>
</div>
