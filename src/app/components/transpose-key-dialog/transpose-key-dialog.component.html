<h2 mat-dialog-title>Selecionar tom</h2>
<mat-dialog-content>
    <div class="tone-grid">
        @for (key of availableKeys; track key) {
            <button
                mat-stroked-button
                type="button"
                class="tone-option"
                [class.tone-option--selected]="key === currentKey"
                [class.!bg-primary]="key === currentKey"
                [class.!text-white]="key === currentKey"
                [class.!border-primary]="key === currentKey"
                (click)="choose(key)"
            >
                {{ key }}
            </button>
        }
    </div>
</mat-dialog-content>
