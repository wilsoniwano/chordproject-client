<div
    class="group flex cursor-pointer overflow-hidden border-b px-3 dark:hover:bg-hover hover:bg-primary-100"
    [class.bg-primary-100]="selected"
    [class.dark:bg-hover]="selected"
    [ngClass]="ngClass || ''"
>
    @if (showDragHandle) {
        <div class="flex items-center justify-center px-1">
            <mat-icon class="flex-shrink-0 cursor-move" cdkDragHandle> drag_indicator </mat-icon>
        </div>
    }

    <div class="flex-1 overflow-hidden px-3 py-4 md:px-4">
        <div class="flex w-full items-center gap-2">
            <div class="flex min-w-0 flex-1 flex-col overflow-hidden">
                <a
                    class="truncate text-base font-bold dark:group-hover:text-primary-900 dark:group-[.bg-primary-50]:text-primary-900"
                    [ngClass]="{ 'text-primary-900': selected }"
                    >{{ song.title }}</a
                >
                @if (secondaryMetaLine) {
                    <div class="text-secondary truncate text-sm">{{ secondaryMetaLine }}</div>
                }
            </div>
            @if (showToneControls && displayedKey) {
                <div class="ml-auto flex flex-shrink-0 items-center gap-2">
                    <button
                        type="button"
                        class="flex h-8 w-8 items-center justify-center rounded-full border border-gray-300 text-sm leading-none dark:border-gray-600"
                        (click)="transpose(-1, $event)"
                    >
                        <mat-icon class="text-base">remove</mat-icon>
                    </button>
                    <span class="rounded bg-gray-100 px-3 py-1 font-mono text-sm dark:bg-gray-700">{{ displayedKey }}</span>
                    <button
                        type="button"
                        class="flex h-8 w-8 items-center justify-center rounded-full border border-gray-300 text-sm leading-none dark:border-gray-600"
                        (click)="transpose(1, $event)"
                    >
                        <mat-icon class="text-base">add</mat-icon>
                    </button>
                </div>
            }
        </div>
    </div>
</div>
