<div class="details-shell bg-card flex w-full flex-col dark:bg-[#0f172a]">
    <!-- Header -->
    <div
        class="details-subheader relative w-full border-b border-gray-200 bg-white px-8 pr-4 dark:border-[#334155] dark:bg-[#0f172a]"
    >
        <!-- Header flex row: title + action left, close right -->
        <div class="mx-auto flex w-full max-w-3xl items-center justify-between pb-3 pt-3">
            <!-- Left: Title -->
                <div class="min-w-0 max-w-xs sm:max-w-md md:max-w-lg">
                    <div class="page-title truncate text-lg">
                        {{ song.title }}
                    </div>
                @if (song.artists?.length) {
                    <div class="text-secondary truncate text-sm">{{ song.artists.join(' - ') }}</div>
                }
            </div>
            <!-- Right: Edit and Close buttons -->
            <div class="flex items-center gap-2">
                <button
                    mat-icon-button
                    class="flex-shrink-0"
                    (click)="openFullEditor()"
                    [matTooltip]="'toolbar.edit' | transloco"
                >
                    <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:pencil-square'"></mat-icon>
                </button>
                <button mat-icon-button class="flex-shrink-0" [matTooltip]="'Close'" [routerLink]="['../']">
                    <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
                </button>
            </div>
        </div>

    </div>

    <!-- Song -->
    <div class="details-content relative flex flex-auto flex-col items-center bg-card p-6 pt-0 dark:bg-[#0f172a] sm:p-12 sm:pt-0">
        <div class="w-full max-w-3xl">
            <chp-viewer #viewer [content]="song.content" [forceDarkHeaderBackground]="true"> </chp-viewer>
        </div>
    </div>
</div>
